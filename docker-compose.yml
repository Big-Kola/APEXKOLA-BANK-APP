services:
  mongodb:
    image: mongo:7
    container_name: apexkola-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - apexkola-net

  backend:
    build: ./backend
    container_name: apexkola-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - apexkola-net
    command: npx nodemon server.js

  frontend:
    image: node:18-alpine
    container_name: apexkola-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_PROXY=http://backend:5000
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - apexkola-net
    command: sh -c "npm install && npm run dev"

volumes:
  mongo_data:

networks:
  apexkola-net:
    driver: bridge
